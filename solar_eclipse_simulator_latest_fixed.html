<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>일식 시뮬레이터</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(to bottom, #87CEEB, #dff4ff);
      color: #ffffff;
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      letter-spacing: -1px;
      color: #10243a;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      border: 0;
      padding: 11px 18px;
      border-radius: 999px;
      font-size: 16px;
      cursor: pointer;
      background: #333;
      color: white;
      transition: 0.15s;
    }

    button:hover { transform: translateY(-1px); }

    button.active {
      background: #ffb300;
      color: black;
      font-weight: 700;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      max-width: 1100px;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid #444;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.28);
      background: linear-gradient(to bottom, #6ec6ff, #dff4ff);
    }

    .video-controls {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(6px);
    }

    .play-pause {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: rgba(255,255,255,0.92);
      color: #111;
      flex-shrink: 0;
    }

    .video-controls input[type="range"] {
      flex: 1;
      accent-color: #ffffff;
    }

    .explain {
      width: 100%;
      max-width: 900px;
      background: rgba(15,35,60,0.88);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 22px;
      line-height: 1.75;
      font-size: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    }

    .explain h2 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 26px;
    }

    .key {
      color: #d7eaff;
      margin-top: 10px;
    }

    .small-note {
      color: #173047;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <h1>일식 시뮬레이터</h1>

    <div class="buttons">
      <button class="mode active" data-mode="total">개기일식</button>
      <button class="mode" data-mode="partial">부분일식</button>
      <button class="mode" data-mode="annular">금환일식</button>
    </div>

    <div class="canvas-wrap">
      <canvas id="canvas" width="1100" height="620"></canvas>

      <div class="video-controls">
        <button id="playBtn" class="play-pause" aria-label="재생">▶</button>
        <input id="timeSlider" type="range" min="0" max="1" step="0.001" value="0" />
      </div>
    </div>

    <section class="explain">
      <h2>현재 장면 설명</h2>
      <div id="explainText"></div>
      <div id="keyText" class="key"></div>
    </section>

    <div class="small-note">
      수업용 일식 시뮬레이터입니다. 실제 천문 계산값이 아닌 개념 이해용 표현입니다.
    </div>
  </main>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const timeSlider = document.getElementById("timeSlider");
    const playBtn = document.getElementById("playBtn");

    let time = 0;
    let solarMode = "total";
    let playing = false;
    let rafId = null;

    const solarExplanation = {
      total: "관측자가 달의 본그림자 안에 있으면 태양 전체가 가려져 개기일식이 나타납니다. 태양의 밝은 광구가 가려져 평소에는 보기 어려운 코로나가 보일 수 있습니다.",
      partial: "관측자가 달의 반그림자 안에 있으면 태양빛의 일부만 가려져 부분일식이 나타납니다. 태양의 밝은 부분이 남아 있기 때문에 코로나는 관측하기 어렵습니다.",
      annular: "달이 지구에서 멀어 작게 보이면 태양을 완전히 가리지 못합니다. 그래서 태양 가장자리가 고리처럼 남는 금환일식이 나타납니다. 태양의 밝은 고리가 남아 있어 코로나는 관측하기 어렵습니다."
    };

    function label(text, x, y, size = 22) {
      ctx.fillStyle = "white";
      ctx.font = size + "px sans-serif";
      ctx.fillText(text, x, y);
    }

    function drawSolar() {
      const w = canvas.width;
      const h = canvas.height;

      const sunX = w * 0.43;
      const sunY = h / 2;
      const sunR = 115;

      let moonR = 120;
      let moonY = sunY;

      if (solarMode === "partial") {
        moonR = 105;
        moonY = sunY - 75;
      }

      if (solarMode === "annular") {
        moonR = 100;
      }

      const startX = w + 160;
      const endX = -160;
      const moonX = startX + (endX - startX) * time;

      const distance = Math.abs(moonX - sunX);
      let darkness = 0;

      if (solarMode === "total") {
        darkness = Math.max(0, 1 - distance / 260);
      } else if (solarMode === "annular") {
        darkness = Math.max(0, 0.65 - distance / 500);
      } else {
        darkness = Math.max(0, 0.45 - distance / 600);
      }

      // sky
      ctx.fillStyle = "#7ecfff";
      ctx.fillRect(0, 0, w, h);

      // sky darkening during eclipse
      ctx.fillStyle = `rgba(0,0,20,${darkness * 0.85})`;
      ctx.fillRect(0, 0, w, h);

      // sun disk
      ctx.fillStyle = "#FDB813";
      ctx.beginPath();
      ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
      ctx.fill();

      // moon disk
      ctx.fillStyle = "#181818";
      ctx.beginPath();
      ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
      ctx.fill();

      // corona only in total solar eclipse
      if (solarMode === "total" && Math.abs(moonX - sunX) < 8) {
        for (let i = 0; i < 5; i++) {
          ctx.strokeStyle = `rgba(255,255,255,${0.55 - i * 0.08})`;
          ctx.lineWidth = 6;
          ctx.beginPath();
          ctx.arc(sunX, sunY, sunR + 9 + i * 8, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      drawSolarDiagram();

      if (solarMode === "total") label("개기일식: 본그림자에서 관측", 28, 42);
      if (solarMode === "partial") label("부분일식: 반그림자에서 관측", 28, 42);
      if (solarMode === "annular") label("금환일식: 달이 작아 보여 고리처럼 관측", 28, 42);
    }

    function drawSolarDiagram() {
      const w = canvas.width;
      const h = canvas.height;
      const baseX = w * 0.80;
      const baseY = h * 0.18;

      label("일식 관측 위치", baseX - 92, baseY - 95, 18);

      // Sun
      ctx.fillStyle = "#FDB813";
      ctx.beginPath();
      ctx.arc(baseX - 145, baseY, 32, 0, Math.PI * 2);
      ctx.fill();
      label("태양", baseX - 164, baseY + 55, 15);

      // Moon
      ctx.fillStyle = "#777";
      ctx.beginPath();
      ctx.arc(baseX - 45, baseY, 17, 0, Math.PI * 2);
      ctx.fill();
      label("달", baseX - 54, baseY + 45, 15);

      // Earth
      ctx.fillStyle = "#2d6cdf";
      ctx.beginPath();
      ctx.arc(baseX + 112, baseY, 48, 0, Math.PI * 2);
      ctx.fill();
      label("지구", baseX + 94, baseY + 70, 15);

      ctx.fillStyle = "rgba(255,255,255,0.18)";
      ctx.beginPath();
      ctx.arc(baseX + 96, baseY - 14, 16, 0, Math.PI * 2);
      ctx.fill();

      if (solarMode === "total") {
        ctx.fillStyle = "rgba(0,0,0,0.68)";
        ctx.beginPath();
        ctx.moveTo(baseX - 45, baseY - 9);
        ctx.lineTo(baseX + 112, baseY - 10);
        ctx.lineTo(baseX + 112, baseY + 10);
        ctx.lineTo(baseX - 45, baseY + 9);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(80,80,80,0.7)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(baseX - 45, baseY - 30);
        ctx.lineTo(baseX + 130, baseY - 48);
        ctx.moveTo(baseX - 45, baseY + 30);
        ctx.lineTo(baseX + 130, baseY + 48);
        ctx.stroke();

        ctx.fillStyle = "#ff3333";
        ctx.beginPath();
        ctx.arc(baseX + 112, baseY, 5, 0, Math.PI * 2);
        ctx.fill();

        label("본그림자", baseX + 25, baseY - 20, 15);
        label("→ 개기일식", baseX + 54, baseY + 28, 15);
      }

      if (solarMode === "partial") {
        ctx.fillStyle = "rgba(80,80,80,0.38)";
        ctx.beginPath();
        ctx.moveTo(baseX - 45, baseY - 32);
        ctx.lineTo(baseX + 138, baseY - 50);
        ctx.lineTo(baseX + 138, baseY + 50);
        ctx.lineTo(baseX - 45, baseY + 32);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(0,0,0,0.55)";
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 5]);
        ctx.beginPath();
        ctx.moveTo(baseX - 45, baseY - 8);
        ctx.lineTo(baseX + 62, baseY - 7);
        ctx.moveTo(baseX - 45, baseY + 8);
        ctx.lineTo(baseX + 62, baseY + 7);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = "#ff3333";
        ctx.beginPath();
        ctx.arc(baseX + 112, baseY - 30, 5, 0, Math.PI * 2);
        ctx.fill();

        label("반그림자", baseX + 15, baseY - 54, 15);
        label("→ 부분일식", baseX + 52, baseY - 12, 15);
      }

      if (solarMode === "annular") {
        ctx.fillStyle = "rgba(0,0,0,0.58)";
        ctx.beginPath();
        ctx.moveTo(baseX - 45, baseY - 8);
        ctx.lineTo(baseX + 35, baseY);
        ctx.lineTo(baseX - 45, baseY + 8);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "rgba(0,0,0,0.42)";
        ctx.beginPath();
        ctx.moveTo(baseX + 35, baseY);
        ctx.lineTo(baseX + 112, baseY - 11);
        ctx.lineTo(baseX + 112, baseY + 11);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(80,80,80,0.7)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(baseX - 45, baseY - 30);
        ctx.lineTo(baseX + 130, baseY - 48);
        ctx.moveTo(baseX - 45, baseY + 30);
        ctx.lineTo(baseX + 130, baseY + 48);
        ctx.stroke();

        ctx.fillStyle = "#ff3333";
        ctx.beginPath();
        ctx.arc(baseX + 112, baseY, 5, 0, Math.PI * 2);
        ctx.fill();

        label("금환영", baseX + 45, baseY - 20, 15);
        label("→ 금환일식", baseX + 52, baseY + 28, 15);
      }

      label("태양-달-지구 / 삭", baseX - 90, baseY + 95, 15);
      label("빨간 점 = 관측자", baseX + 40, baseY + 95, 15);
    }

    function updateExplanation() {
      const explainText = document.getElementById("explainText");
      const keyText = document.getElementById("keyText");

      explainText.textContent = solarExplanation[solarMode];
      keyText.textContent = "핵심 배열: 태양 - 달 - 지구 / 달의 위상: 삭";
    }

    function draw() {
      drawSolar();
      updateExplanation();
    }

    function animate() {
      if (!playing) return;

      time += 0.003;
      if (time > 1) time = 0;

      timeSlider.value = time;
      draw();

      rafId = requestAnimationFrame(animate);
    }

    timeSlider.addEventListener("input", (e) => {
      time = Number(e.target.value);
      draw();
    });

    playBtn.addEventListener("click", () => {
      playing = !playing;
      playBtn.textContent = playing ? "Ⅱ" : "▶";

      if (playing) {
        animate();
      } else {
        cancelAnimationFrame(rafId);
      }
    });

    document.querySelectorAll(".mode").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".mode").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");

        solarMode = btn.dataset.mode;
        draw();
      });
    });

    draw();
  </script>
</body>
</html>
